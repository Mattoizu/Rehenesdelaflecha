<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo gris oscuro -->
  <rect width="512" height="512" fill="#2a2a2a" rx="96"/>
  
  <!-- Sol negro arriba -->
  <circle cx="256" cy="140" r="68" fill="#111111"/>
  <!-- Rayos del sol -->
  <g stroke="#111111" stroke-width="8" stroke-linecap="round">
    <line x1="256" y1="48" x2="256" y2="26"/>
    <line x1="256" y1="232" x2="256" y2="254"/>
    <line x1="164" y1="140" x2="142" y2="140"/>
    <line x1="348" y1="140" x2="370" y2="140"/>
    <line x1="199" y1="83" x2="183" y2="67"/>
    <line x1="313" y1="83" x2="329" y2="67"/>
    <line x1="199" y1="197" x2="183" y2="213"/>
    <line x1="313" y1="197" x2="329" y2="213"/>
  </g>

  <!-- Torre central -->
  <rect x="214" y="234" width="84" height="190" fill="white" stroke="white" stroke-width="2" rx="2"/>
  <!-- Almenas torre central -->
  <rect x="214" y="218" width="16" height="22" fill="white" rx="1"/>
  <rect x="236" y="218" width="16" height="22" fill="white" rx="1"/>
  <rect x="258" y="218" width="16" height="22" fill="white" rx="1"/>
  <rect x="280" y="218" width="16" height="22" fill="white" rx="1"/>
  <!-- Ventanas torre central -->
  <rect x="244" y="262" width="24" height="32" fill="#2a2a2a" rx="2"/>
  <rect x="244" y="334" width="24" height="32" fill="#2a2a2a" rx="2"/>

  <!-- Torre izquierda -->
  <rect x="146" y="288" width="62" height="136" fill="white" rx="2"/>
  <!-- Almenas torre izquierda -->
  <rect x="146" y="272" width="12" height="20" fill="white" rx="1"/>
  <rect x="163" y="272" width="12" height="20" fill="white" rx="1"/>
  <rect x="180" y="272" width="12" height="20" fill="white" rx="1"/>
  <rect x="197" y="272" width="12" height="20" fill="white" rx="1"/>
  <!-- Ventana torre izquierda -->
  <rect x="163" y="312" width="18" height="26" fill="#2a2a2a" rx="2"/>

  <!-- Torre derecha -->
  <rect x="304" y="288" width="62" height="136" fill="white" rx="2"/>
  <!-- Almenas torre derecha -->
  <rect x="304" y="272" width="12" height="20" fill="white" rx="1"/>
  <rect x="321" y="272" width="12" height="20" fill="white" rx="1"/>
  <rect x="338" y="272" width="12" height="20" fill="white" rx="1"/>
  <rect x="355" y="272" width="12" height="20" fill="white" rx="1"/>
  <!-- Ventana torre derecha -->
  <rect x="321" y="312" width="18" height="26" fill="#2a2a2a" rx="2"/>

  <!-- Muro que une torres -->
  <rect x="146" y="360" width="220" height="64" fill="white" rx="2"/>
  <!-- Puerta arqueada -->
  <path d="M234 424 L234 378 Q256 360 278 378 L278 424 Z" fill="#2a2a2a"/>

  <!-- Base -->
  <rect x="96" y="420" width="320" height="18" fill="white" rx="3"/>
</svg>
